{% extends "base.html" %}

{% block content %}
  <h2>Login</h2>

  {% if error %}
    <p>{{ error }}</p>
    <br>
  {% endif %}

  <form method="post">
    <label>Username</label><br>
    <input type="text" name="username" required>

    <br><br>

    <label>Password</label><br>
    <input type="password" name="password" required>

    <br><br>

    <button class="btn" type="submit">Login</button>
  </form>
{% endblock %}

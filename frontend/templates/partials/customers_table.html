{% if customers %}
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th class="col-notes">Notes</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody>
      {% for customer in customers %}
        <tr>
          <td>{{ customer.name }}</td>
          <td>{{ customer.email }}</td>
          <td>{{ customer.phone }}</td>
          <td>{{ customer.notes or "-" }}</td>

          <td>
            <a href="{{ url_for('edit_customer_page', customer_id=customer.id) }}" class="btn btn-edit">
              Edit
            </a>
          </td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
{% else %}
  <p>No customers found.</p>
{% endif %}

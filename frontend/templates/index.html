{% extends "base.html" %}

{% block content %}
  <div class="nav-bar">
    <a href="{{ url_for('index') }}?view=orders"
      class="nav-btn {% if view == 'orders' %}active{% endif %}">
      Orders
    </a>

    <a href="{{ url_for('index') }}?view=customers"
      class="nav-btn {% if view == 'customers' %}active{% endif %}">
      Customers
    </a>
  </div>

  <form method="get" action="{{ url_for('index') }}">
    <input type="hidden" name="view" value="{{ view }}">
    <input
      type="search"
      name="search"
      placeholder="{% if view == 'customers' %}Search by name or email...{% else %}Search by order code or email...{% endif %}"
      value="{{ search or '' }}"
    />

    <button class="btn-search" type="submit">Search</button>

    {% if search %}
      <a class="clear-btn" href="{{ url_for('index') }}?view={{ view }}">
        Clear
      </a>
    {% endif %}
  </form>

  {% if view == "customers" %}
    {% include "partials/customers_table.html" %}
  {% else %}
    {% include "partials/orders_table.html" %}
  {% endif %}
{% endblock %}

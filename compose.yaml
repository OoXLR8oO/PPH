services:
  app:
    build: .

    container_name: pph-app

    ports:
      - "8000:8000"

    env_file:
      - .env.docker

    depends_on:
      - postgres

    restart: unless-stopped

  postgres:
    image: postgres:18
    container_name: pph-db

    env_file:
      - .env.docker

    ports:
      - "5432"

    volumes:
      - postgres_data:/var/lib/postgresql

    restart: unless-stopped

volumes:
  postgres_data:
